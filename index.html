            setFormData({

            e.preventDefault();

            const observerOptions = {
              threshold: 0.1,
              rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('visible');
                  
                  const sectionId = entry.target.id;
                  if (sectionId) {
                    setActiveSection(sectionId);
                  }
                  
                  if (entry.target.id === 'skills') {
                    const skillBars = entry.target.querySelectorAll('.skill-progress');
                    skillBars.forEach(bar => {
                      const width = bar.getAttribute('data-width');
                      setTimeout(() => {
                        bar.style.width = width;
                      }, 500);
                    });
                  }
                  
                  if (entry.target.id === 'experience') {
                    const timelineItems = entry.target.querySelectorAll('.timeline-item');
                    timelineItems.forEach((item, index) => {
                      setTimeout(() => {
                        item.classList.add('visible');
                      }, index * 150);
                    });
                  }
                }
              });
            }, observerOptions);

            document.querySelectorAll('.section').forEach(section => {
              observer.observe(section);
            });

            const handleScroll = () => {
              const navbar = document.querySelector('.navbar');
              if (navbar) {
                if (window.scrollY > 100) {
                  navbar.style.background = 'rgba(255, 255, 255, 0.98)';
                  navbar.style.boxShadow = '0 2px 30px rgba(0, 0, 0, 0.15)';
                } else {
                  navbar.style.background = 'rgba(255, 255, 255, 0.95)';
                  navbar.style.boxShadow = '0 2px 20px rgba(0, 0, 0, 0.1)';
                }
              }
            };

            window.addEventListener('scroll', handleScroll);

            return () => {
              window.removeEventListener('scroll', handleScroll);
              observer.disconnect();
            };
          }, []);

          return React.createElement('div', { className: 'App' },
            React.createElement(Navigation, { activeSection }),
            React.createElement(Hero),
            React.createElement(About),
            React.createElement(Experience),
            React.createElement(Projects),
            React.createElement(Skills),
            React.createElement(Education),
            React.createElement(Contact)
          );
        };

        console.log("About to render app");

        // Render the App
        const renderApp = () => {
          try {
            console.log("Attempting to render...");
            const container = document.getElementById('root');
            if (!container) {
              console.error("Root container not found!");
              return;
            }
            
            const root = ReactDOM.createRoot(container);
            root.render(React.createElement(App));
            console.log("App rendered successfully!");
          } catch (error) {
            console.error("Error rendering app:", error);
            // Fallback: show error message
            document.getElementById('root').innerHTML = `
              <div style="padding: 2rem; text-align: center; color: red;">
                <h2>Error Loading Portfolio</h2>
                <p>Please check the browser console for details.</p>
                <p>Error: ${error.message}</p>
              </div>
            `;
          }
        };

        // Wait for everything to load
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', renderApp);
        } else {
          renderApp();
        }
    </script>
</body>

                { name: "Statistical Analysis", level: 75 }
              ]
            }
          ],

          education: [
            {
              type: "Education",
              title: "Bachelor of Mechanical Engineering",
              institution: "National University of Singapore • 2024",
              description: "Robust foundation in engineering principles and analytical thinking, with strong problem-solving and quantitative analysis skills."
            },
            {
              type: "Specialization",
              title: "Machine Learning Specialization", 
              institution: "DeepLearning.AI • 2024",
              description: "Comprehensive specialization covering supervised learning, advanced algorithms, unsupervised learning, and reinforcement learning."
            },
            {
              type: "Specialization",
              title: "Google Data Analytics & Advanced Data Analytics",
              institution: "Google • 2024", 
              description: "Professional certificates in data analytics covering data collection, analysis, visualization, and advanced statistical methods."
            },
            {
              type: "Certification",
              title: "AWS Cloud Practitioner & ML Introduction",
              institution: "Amazon Web Services • 2024",
              description: "Cloud computing fundamentals and introduction to machine learning services on AWS platform."
            }
          ],

          social: [
            { platform: "LinkedIn", icon: "in", description: "Connect professionally", url: "https://www.linkedin.com/in/yipkaimen/" },
            { platform: "GitHub", icon: "gh", description: "View my projects", url: "https://github.com/keemawn" },
            { platform: "Email", icon: "@", description: "yipkaimen@yahoo.com", url: "mailto:yipkaimen@yahoo.com" }
          ]
        };

        // React Components
        const Navigation = ({ activeSection }) => {
          const navItems = ['home', 'about', 'experience', 'projects', 'skills', 'education', 'contact'];
          
          return (
            <nav className="navbar">
              <div className="container">
                <div className="nav-container">
                  <div className="logo">{portfolioData.personal.name}</div>
                  <ul className="nav-links">
                    {navItems.map(item => (
                      <li key={item}>
                        <a 
                          href={`#${item}`}
                          className={activeSection === item ? 'active' : ''}
                          onClick={(e) => {
                            e.preventDefault();
                            document.getElementById(item).scrollIntoView({ behavior: 'smooth' });
                          }}
                        >
                          {item.charAt(0).toUpperCase() + item.slice(1)}
                        </a>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </nav>
          );
        };

        const Hero = () => {
          const { name, title, tagline, profileImage } = portfolioData.personal;
          
          return (
            <section id="home" className="hero">
              <div className="hero-content">
                <div className="profile-img">
                  {profileImage ? (
                    <img 
                      src={profileImage} 
                      alt={name}
                      style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '50%' }}
                    />
                  ) : '👤'}
                </div>
                <h1>{name}</h1>
                <h2>{title}</h2>
                <a 
                  href="#about" 
                  className="cta-button"
                  onClick={(e) => {
                    e.preventDefault();
                    document.getElementById('about').scrollIntoView({ behavior: 'smooth' });
                  }}
                >
                  {tagline}
                </a>
              </div>
            </section>
          );
        };

        const About = () => {
          const { text, stats } = portfolioData.about;
          
          return (
            <section id="about" className="section">
              <div className="container">
                <h2 className="section-title">About Me</h2>
                <div className="about-content">
                  <div className="about-text">
                    {text.map((paragraph, index) => (
                      <p key={index}>{paragraph}</p>
                    ))}
                  </div>
                  <div className="about-stats">
                    {stats.map((stat, index) => (
                      <div key={index} className="stat-item">
                        <span className="stat-number">{stat.number}</span>
                        <span>{stat.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>
          );
        };

        const Experience = () => {
          return (
            <section id="experience" className="section">
              <div className="container">
                <h2 className="section-title">Professional Experience</h2>
                <div className="timeline">
                  {portfolioData.experience.map((item, index) => (
                    <div key={index} className="timeline-item">
                      <div className="timeline-content">
                        <div className="timeline-date">{item.date}</div>
                        <div className="timeline-title">{item.title}</div>
                        <div className="timeline-company">{item.company}</div>
                        <p>{item.description}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        const Projects = () => {
          return (
            <section id="projects" className="section">
              <div className="container">
                <h2 className="section-title">My Projects</h2>
                <div className="projects-grid">
                  {portfolioData.projects.map((project, index) => (
                    <div key={index} className="project-card">
                      <div className="project-header">
                        <h3 className="project-title">{project.title}</h3>
                        <div className="project-tech">{project.tech}</div>
                      </div>
                      <p className="project-description">{project.description}</p>
                      <div className="project-links">
                        {project.link !== '#' && (
                          <a 
                            href={project.link} 
                            className="project-link" 
                            target="_blank" 
                            rel="noopener noreferrer"
                          >
                            Live Demo
                          </a>
                        )}
                        {project.github !== '#' && (
                          <a 
                            href={project.github} 
                            className="project-link" 
                            target="_blank" 
                            rel="noopener noreferrer"
                          >
                            GitHub
                          </a>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        const Skills = () => {
          return (
            <section id="skills" className="section">
              <div className="container">
                <h2 className="section-title">Skills & Expertise</h2>
                <div className="skills-grid">
                  {portfolioData.skills.map((category, index) => (
                    <div key={index} className="skill-category">
                      <h3>{category.category}</h3>
                      {category.items.map((skill, skillIndex) => (
                        <div key={skillIndex} className="skill-item">
                          <div className="skill-name">
                            <span>{skill.name}</span>
                            <span>{skill.level}%</span>
                          </div>
                          <div className="skill-bar">
                            <div 
                              className="skill-progress" 
                              data-width={`${skill.level}%`}
                            ></div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        const Education = () => {
          return (
            <section id="education" className="section">
              <div className="container">
                <h2 className="section-title">Education & Certifications</h2>
                <div className="education-grid">
                  {portfolioData.education.map((item, index) => (
                    <div key={index} className="education-card">
                      <div className="education-type">{item.type}</div>
                      <div className="education-title">{item.title}</div>
                      <div className="education-institution">{item.institution}</div>
                      <p>{item.description}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        const Contact = () => {
          const [formData, setFormData] = React.useState({
            name: '',
            email: '',
            subject: '',
            message: ''
          });

          const handleInputChange = (e) => {
            setFormData({
              ...formData,
              [e.target.name]: e.target.value
            });
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            
            if (!formData.name || !formData.email || !formData.subject || !formData.message) {
              alert('Please fill in all fields');
              return;
            }
            
            alert('Thank you for your message! I\'ll get back to you soon.');
            setFormData({ name: '', email: '', subject: '', message: '' });
          };

          return (
            <section id="contact" className="section">
              <div className="container">
                <h2 className="section-title">Let's Connect</h2>
                <div className="contact-content">
                  <form className="contact-form" onSubmit={handleSubmit}>
                    <h3>Send me a message</h3>
                    <div className="form-group">
                      <label htmlFor="name">Name</label>
                      <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        value={formData.name}
                        onChange={handleInputChange}
                        required 
                      />
                    </div>
                    <div className="form-group">
                      <label htmlFor="email">Email</label>
                      <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        value={formData.email}
                        onChange={handleInputChange}
                        required 
                      />
                    </div>
                    <div className="form-group">
                      <label htmlFor="subject">Subject</label>
                      <input 
                        type="text" 
                        id="subject" 
                        name="subject" 
                        value={formData.subject}
                        onChange={handleInputChange}
                        required 
                      />
                    </div>
                    <div className="form-group">
                      <label htmlFor="message">Message</label>
                      <textarea 
                        id="message" 
                        name="message" 
                        rows="5" 
                        value={formData.message}
                        onChange={handleInputChange}
                        required
                      ></textarea>
                    </div>
                    <button type="submit" className="submit-btn">Send Message</button>
                  </form>
                  <div className="social-links">
                    {portfolioData.social.map((social, index) => (
                      <a 
                        key={index} 
                        href={social.url} 
                        className="social-link"
                        target="_blank"
                        rel="noopener noreferrer"
                      >
                        <div className="social-icon">{social.icon}</div>
                        <div>
                          <strong>{social.platform}</strong>
                          <div>{social.description}</div>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              </div>
            </section>
          );
        };

        // Main App Component
        const App = () => {
          const [activeSection, setActiveSection] = React.useState('home');

          React.useEffect(() => {
            const observerOptions = {
              threshold: 0.1,
              rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('visible');
                  
                  const sectionId = entry.target.id;
                  if (sectionId) {
                    setActiveSection(sectionId);
                  }
                  
                  // GENTLER skill bar animation - no flashing
                  if (entry.target.id === 'skills') {
                    const skillBars = entry.target.querySelectorAll('.skill-progress');
                    skillBars.forEach(bar => {
                      const width = bar.getAttribute('data-width');
                      setTimeout(() => {
                        bar.style.width = width;
                      }, 500); // Longer delay for gentler animation
                    });
                  }
                  
                  // Timeline animation with smaller delay
                  if (entry.target.id === 'experience') {
                    const timelineItems = entry.target.querySelectorAll('.timeline-item');
                    timelineItems.forEach((item, index) => {
                      setTimeout(() => {
                        item.classList.add('visible');
                      }, index * 150); // Reduced delay
                    });
                  }
                }
              });
            }, observerOptions);

            document.querySelectorAll('.section').forEach(section => {
              observer.observe(section);
            });

            const handleScroll = () => {
              const navbar = document.querySelector('.navbar');
              if (window.scrollY > 100) {
                navbar.style.background = 'rgba(255, 255, 255, 0.98)';
                navbar.style.boxShadow = '0 2px 30px rgba(0, 0, 0, 0.15)';
              } else {
                navbar.style.background = 'rgba(255, 255, 255, 0.95)';
                navbar.style.boxShadow = '0 2px 20px rgba(0, 0, 0, 0.1)';
              }
            };

            window.addEventListener('scroll', handleScroll);

            return () => {
              window.removeEventListener('scroll', handleScroll);
              observer.disconnect();
            };
          }, []);

          return (
            <div className="App">
              <Navigation activeSection={activeSection} />
              <Hero />
              <About />
              <Experience />
              <Projects />
              <Skills />
              <Education />
              <Contact />
            </div>
          );
        };

        // Render the App
        document.addEventListener('DOMContentLoaded', () => {
          const container = document.getElementById('root');
          const root = ReactDOM.createRoot(container);
          root.render(<App />);
        });
    </script>
</body>
</html>
