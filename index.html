          skills: [

          education: [

          social: [

            { platform: "GitHub", icon: "gh", description: "View my projects", url: "https://github.com/keemawn" },
            { platform: "Email", icon: "@", description: "yipkaimen@yahoo.com", url: "mailto:yipkaimen@yahoo.com" }
          ]
        };

        // Navigation Component
        const Navigation = ({ activeSection }) => {
          const navItems = ['home', 'about', 'experience', 'projects', 'skills', 'education', 'contact'];
          
          const handleClick = (section) => {
            document.getElementById(section).scrollIntoView({ behavior: 'smooth' });
          };

          return React.createElement('nav', { className: 'navbar' },
            React.createElement('div', { className: 'container' },
              React.createElement('div', { className: 'nav-container' },
                React.createElement('div', { className: 'logo' }, portfolioData.personal.name),
                React.createElement('ul', { className: 'nav-links' },
                  navItems.map(item => 
                    React.createElement('li', { key: item },
                      React.createElement('a', {
                        href: `#${item}`,
                        className: activeSection === item ? 'active' : '',
                        onClick: (e) => {
                          e.preventDefault();
                          handleClick(item);
                        }
                      }, item.charAt(0).toUpperCase() + item.slice(1))
                    )
                  )
                )
              )
            )
          );
        };

        // Hero Component
        const Hero = () => {
          return React.createElement('section', { id: 'home', className: 'hero' },
            React.createElement('div', { className: 'hero-content' },
              React.createElement('div', { className: 'profile-img' }, '👤'),
              React.createElement('h1', null, portfolioData.personal.name),
              React.createElement('h2', null, portfolioData.personal.title),
              React.createElement('a', {
                href: '#about',
                className: 'cta-button',
                onClick: (e) => {
                  e.preventDefault();
                  document.getElementById('about').scrollIntoView({ behavior: 'smooth' });
                }
              }, portfolioData.personal.tagline)
            )
          );
        };

        // About Component
        const About = () => {
          return React.createElement('section', { id: 'about', className: 'section' },
            React.createElement('div', { className: 'container' },
              React.createElement('h2', { className: 'section-title' }, 'About Me'),
              React.createElement('div', { className: 'about-content' },
                React.createElement('div', { className: 'about-text' },
                  portfolioData.about.text.map((paragraph, index) =>
                    React.createElement('p', { key: index }, paragraph)
                  )
                ),
                React.createElement('div', { className: 'about-stats' },
                  portfolioData.about.stats.map((stat, index) =>
                    React.createElement('div', { key: index, className: 'stat-item' },
                      React.createElement('span', { className: 'stat-number' }, stat.number),
                      React.createElement('span', null, stat.label)
                    )
                  )
                )
              )
            )
          );
        };

        // Experience Component
        const Experience = () => {
          return React.createElement('section', { id: 'experience', className: 'section' },
            React.createElement('div', { className: 'container' },
              React.createElement('h2', { className: 'section-title' }, 'Professional Experience'),
              React.createElement('div', { className: 'timeline' },
                portfolioData.experience.map((item, index) =>
                  React.createElement('div', { key: index, className: 'timeline-item' },
                    React.createElement('div', { className: 'timeline-content' },
                      React.createElement('div', { className: 'timeline-date' }, item.date),
                      React.createElement('div', { className: 'timeline-title' }, item.title),
                      React.createElement('div', { className: 'timeline-company' }, item.company),
                      React.createElement('p', null, item.description)
                    )
                  )
                )
              )
            )
          );
        };

        // Projects Component
        const Projects = () => {
          return React.createElement('section', { id: 'projects', className: 'section' },
            React.createElement('div', { className: 'container' },
              React.createElement('h2', { className: 'section-title' }, 'My Projects'),
              React.createElement('div', { className: 'projects-grid' },
                portfolioData.projects.map((project, index) =>
                  React.createElement('div', { key: index, className: 'project-card' },
                    React.createElement('div', { className: 'project-header' },
                      React.createElement('h3', { className: 'project-title' }, project.title),
                      React.createElement('div', { className: 'project-tech' }, project.tech)
                    ),
                    React.createElement('p', { className: 'project-description' }, project.description),
                    React.createElement('div', { className: 'project-links' },
                      project.link !== '#' ? React.createElement('a', {
                        href: project.link,
                        className: 'project-link',
                        target: '_blank',
                        rel: 'noopener noreferrer'
                      }, 'Live Demo') : null,
                      project.github !== '#' ? React.createElement('a', {
                        href: project.github,
                        className: 'project-link',
                        target: '_blank',
                        rel: 'noopener noreferrer'
                      }, 'GitHub') : null
                    )
                  )
                )
              )
            )
          );
        };

        // Skills Component
        const Skills = () => {
          return React.createElement('section', { id: 'skills', className: 'section' },
            React.createElement('div', { className: 'container' },
              React.createElement('h2', { className: 'section-title' }, 'Skills & Expertise'),
              React.createElement('div', { className: 'skills-grid' },
                portfolioData.skills.map((category, index) =>
                  React.createElement('div', { key: index, className: 'skill-category' },
                    React.createElement('h3', null, category.category),
                    category.items.map((skill, skillIndex) =>
                      React.createElement('div', { key: skillIndex, className: 'skill-item' },
                        React.createElement('div', { className: 'skill-name' },
                          React.createElement('span', null, skill.name),
                          React.createElement('span', null, `${skill.level}%`)
                        ),
                        React.createElement('div', { className: 'skill-bar' },
                          React.createElement('div', {
                            className: 'skill-progress',
                            'data-width': `${skill.level}%`
                          })
                        )
                      )
                    )
                  )
                )
              )
            )
          );
        };

        // Education Component
        const Education = () => {
          return React.createElement('section', { id: 'education', className: 'section' },
            React.createElement('div', { className: 'container' },
              React.createElement('h2', { className: 'section-title' }, 'Education & Certifications'),
              React.createElement('div', { className: 'education-grid' },
                portfolioData.education.map((item, index) =>
                  React.createElement('div', { key: index, className: 'education-card' },
                    React.createElement('div', { className: 'education-type' }, item.type),
                    React.createElement('div', { className: 'education-title' }, item.title),
                    React.createElement('div', { className: 'education-institution' }, item.institution),
                    React.createElement('p', null, item.description)
                  )
                )
              )
            )
          );
        };

        // Contact Component
        const Contact = () => {
          const [formData, setFormData] = React.useState({
            name: '',
            email: '',
            subject: '',
            message: ''
          });

          const handleInputChange = (e) => {
            setFormData({
              ...formData,
              [e.target.name]: e.target.value
            });
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            
            if (!formData.name || !formData.email || !formData.subject || !formData.message) {
              alert('Please fill in all fields');
              return;
            }
            
            alert('Thank you for your message! I\'ll get back to you soon.');
            setFormData({ name: '', email: '', subject: '', message: '' });
          };

          return React.createElement('section', { id: 'contact', className: 'section' },
            React.createElement('div', { className: 'container' },
              React.createElement('h2', { className: 'section-title' }, 'Let\'s Connect'),
              React.createElement('div', { className: 'contact-content' },
                React.createElement('form', { className: 'contact-form', onSubmit: handleSubmit },
                  React.createElement('h3', null, 'Send me a message'),
                  React.createElement('div', { className: 'form-group' },
                    React.createElement('label', { htmlFor: 'name' }, 'Name'),
                    React.createElement('input', {
                      type: 'text',
                      id: 'name',
                      name: 'name',
                      value: formData.name,
                      onChange: handleInputChange,
                      required: true
                    })
                  ),
                  React.createElement('div', { className: 'form-group' },
                    React.createElement('label', { htmlFor: 'email' }, 'Email'),
                    React.createElement('input', {
                      type: 'email',
                      id: 'email',
                      name: 'email',
                      value: formData.email,
                      onChange: handleInputChange,
                      required: true
                    })
                  ),
                  React.createElement('div', { className: 'form-group' },
                    React.createElement('label', { htmlFor: 'subject' }, 'Subject'),
                    React.createElement('input', {
                      type: 'text',
                      id: 'subject',
                      name: 'subject',
                      value: formData.subject,
                      onChange: handleInputChange,
                      required: true
                    })
                  ),
                  React.createElement('div', { className: 'form-group' },
                    React.createElement('label', { htmlFor: 'message' }, 'Message'),
                    React.createElement('textarea', {
                      id: 'message',
                      name: 'message',
                      rows: 5,
                      value: formData.message,
                      onChange: handleInputChange,
                      required: true
                    })
                  ),
                  React.createElement('button', { type: 'submit', className: 'submit-btn' }, 'Send Message')
                ),
                React.createElement('div', { className: 'social-links' },
                  portfolioData.social.map((social, index) =>
                    React.createElement('a', {
                      key: index,
                      href: social.url,
                      className: 'social-link',
                      target: '_blank',
                      rel: 'noopener noreferrer'
                    },
                      React.createElement('div', { className: 'social-icon' }, social.icon),
                      React.createElement('div', null,
                        React.createElement('strong', null, social.platform),
                        React.createElement('div', null, social.description)
                      )
                    )
                  )
                )
              )
            )
          );
        };

        // Main App Component
        const App = () => {
          const [activeSection, setActiveSection] = React.useState('home');

          React.useEffect(() => {
            // Intersection Observer for animations
            const observerOptions = {
              threshold: 0.1,
              rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('visible');
                  
                  // Update active section
                  const sectionId = entry.target.id;
                  if (sectionId) {
                    setActiveSection(sectionId);
                  }
                  
                  // Animate skill bars
                  if (entry.target.id === 'skills') {
                    const skillBars = entry.target.querySelectorAll('.skill-progress');
                    skillBars.forEach(bar => {
                      const width = bar.getAttribute('data-width');
                      setTimeout(() => {
                        bar.style.width = width;
                      }, 300);
                    });
                  }
                  
                  // Animate timeline items
                  if (entry.target.id === 'experience') {
                    const timelineItems = entry.target.querySelectorAll('.timeline-item');
                    timelineItems.forEach((item, index) => {
                      setTimeout(() => {
                        item.classList.add('visible');
                      }, index * 200);
                    });
                  }
                }
              });
            }, observerOptions);

            // Observe all sections
            document.querySelectorAll('.section').forEach(section => {
              observer.observe(section);
            });

            // Navbar background on scroll
            const handleScroll = () => {
              const navbar = document.querySelector('.navbar');
              if (window.scrollY > 100) {
                navbar.style.background = 'rgba(255, 255, 255, 0.98)';
                navbar.style.boxShadow = '0 2px 30px rgba(0, 0, 0, 0.15)';
              } else {
                navbar.style.background = 'rgba(255, 255, 255, 0.95)';
                navbar.style.boxShadow = '0 2px 20px rgba(0, 0, 0, 0.1)';
              }
            };

            window.addEventListener('scroll', handleScroll);

            // Cleanup
            return () => {
              window.removeEventListener('scroll', handleScroll);
              observer.disconnect();
            };
          }, []);

          return React.createElement('div', { className: 'App' },
            React.createElement(Navigation, { activeSection }),
            React.createElement(Hero),
            React.createElement(About),
            React.createElement(Experience),
            React.createElement(Projects),
            React.createElement(Skills),
            React.createElement(Education),
            React.createElement(Contact)
          );
        };

        // Render the App
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(React.createElement(App));
    </script>
